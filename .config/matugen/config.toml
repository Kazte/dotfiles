[config]
[config.wallpaper]
command = "awww img --transition-type any {{ image }} && cp {{ image }} $HOME/.current_wallpaper"
set = true

[templates.waybar]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/waybar/colors.css'
post_hook = '~/.config/waybar/scripts/launch.sh'

[templates.hyprland]
input_path = './templates/hyprland-colors.conf'
output_path = '~/.config/hypr/colors.conf'